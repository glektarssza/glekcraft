# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build
on:
  workflow_dispatch:
    inputs:
      project:
        description: >
          The project to build.
        type: string
        required: true
        default: Glekcraft/Glekcraft.csproj
      build-os:
        description: >
          The operating system to build for.

          Valid options are:
           * `windows`
           * `linux`
           * `macos`
        type: choice
        required: true
        options:
          - windows
          - linux
          - macos
      build-config:
        description: >
          The project configuration to build.

          Valid options are:
           * `debug`
           * `release`
        type: choice
        required: true
        options:
          - debug
          - release
  workflow_call:
    inputs:
      project:
        description: >
          The project to build.
        type: string
        required: true
      build-os:
        description: >
          The operating system to build for.

          Valid options are:
           * `windows`
           * `linux`
           * `macos`
        type: string
        required: true
      build-config:
        description: >
          The project configuration to build.

          Valid options are:
           * `debug`
           * `release`
        type: string
        required: true
    outputs:
      artifact-id:
        description: >
          The identifier of the artifact generated by this workflow run.
        value: ${{jobs.build.outputs.artifact-id}}
      artifact-name:
        description: >
          The name of the artifact generated by this workflow run.
        value: ${{jobs.build.outputs.artifact-name}}
    secrets:
      github-token:
        description: >
          The token to use for making authenticated GitHub calls.
        required: true
jobs:
  build:
    name: Build
    runs-on: ${{(inputs.build-os == 'windows' && 'windows-latest') || (inputs.build-os == 'macos' && 'macos-latest') || (inputs.build-os == 'linux' && 'ubuntu-latest') || ''}}
    env:
      NUGET_PACKAGES: ${{github.workspace}}/.nuget/packages/
    outputs:
      artifact-id: ${{steps.upload-artifacts.outputs.artifact-id}}
      artifact-name: ${{steps.upload-artifacts.outputs.artifact-name}}
    steps:
      - id: checkout-repository
        name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{secrets.github-token || secrets.GITHUB_TOKEN}}
      - id: setup-dotnet
        name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - id: restore-dependencies
        name: Restore dependencies
        run: dotnet restore --locked-mode --use-current-runtime
      - id: build
        name: Build
        run: dotnet build --no-restore --use-current-runtime --configuration ${{inputs.build-config}}
      - id: generate-artifacts
        name: Generate artifacts
        run: dotnet publish --no-build --use-current-runtime --configuration ${{inputs.build-config}} --output ${{github.workspace}}/dist/ ${{inputs.project}}
      - id: upload-artifacts
        name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{inputs.build-os}}-${{inputs.build-config}}
          path: ${{github.workspace}}/dist/
