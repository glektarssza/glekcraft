name: Push
on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
jobs:
  build:
    name: Build
    runs-on: ${{matrix.build-os}}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        build-os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        build-config:
          - Debug
          - Release
    steps:
      - id: checkout-repository
        name: Checkout repository
        uses: actions/checkout@v4
      - id: setup-dotnet
        name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - id: restore-dotnet-dependencies
        name: Restore .NET dependencies
        run: dotnet restore
      - id: build-dotnet-projects
        name: Build .NET projects
        run: dotnet build --no-restore --configuration ${{matrix.build-config}}
  test:
    name: Test
    runs-on: ${{matrix.build-os}}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        build-os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - id: checkout-repository
        name: Checkout repository
        uses: actions/checkout@v4
      - id: setup-dotnet
        name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - id: restore-dotnet-dependencies
        name: Restore .NET dependencies
        run: dotnet restore
      - id: build-dotnet-projects
        name: Build .NET projects
        run: dotnet build --no-restore --configuration Debug
      - id: test-dotnet-projects
        name: Test .NET projects
        run: dotnet test --no-build --configuration Debug
