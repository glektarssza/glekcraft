# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: On Pull Request
on:
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yaml
    strategy:
      fail-fast: true
      matrix:
        build-os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        build-configuration:
          - Debug
          - Release
    secrets:
      github-token: ${{github.token}}
    with:
      build-os: ${{matrix.build-os}}
      build-configuration: ${{matrix.build-configuration}}
  test:
    name: Test
    uses: ./.github/workflows/test.yaml
    strategy:
      fail-fast: true
      matrix:
        build-os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    secrets:
      github-token: ${{github.token}}
    with:
      build-os: ${{matrix.build-os}}
