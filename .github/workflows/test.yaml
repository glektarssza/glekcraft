# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test
on:
  push:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      build-os:
        description: >
          The operating system to build for.

          Valid options are:
           * `linux`
           * `windows`
           * `macos`
        type: string
        required: true
    secrets:
      github-token:
        description: |
          The token to use when accessing GitHub APIs.
        required: true
      reportgenerator-license:
        description: |
          The license key to use for the code coverage report generator tool.
        required: true
jobs:
  test:
    name: Test
    runs-on: ${{matrix.build-os}}
    strategy:
      fail-fast: true
      matrix:
        build-os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        exclude:
          - build-os: ${{(inputs.build-os == 'linux' && 'windows-latest') || (inputs.build-os == 'macos' && 'windows-latest') || (inputs.build-os == 'windows' && '')}}
          - build-os: ${{(inputs.build-os == 'linux' && '') || (inputs.build-os == 'macos' && 'ubuntu-latest') || (inputs.build-os == 'windows' && 'ubuntu-latest')}}
          - build-os: ${{(inputs.build-os == 'linux' && 'macos-latest') || (inputs.build-os == 'macos' && '') || (inputs.build-os == 'windows' && 'macos-latest')}}
    env:
      NUGET_PACKAGES: ${{github.workspace}}/.nuget/packages
    steps:
      - id: checkout-repository
        name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{secrets.github-token || github.token}}
          lfs: true
      - id: setup-dotnet
        name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - id: restore-dependencies
        name: Restore dependencies
        run: dotnet restore --locked-mode
      - id: test
        name: Test
        run: dotnet test --no-restore --configuration Debug
      - id: collect-coverage
        name: Collect coverage
        run: dotnet test --no-restore --configuration Debug --collect 'XPlat Code Coverage' --results-directory testResults
      - id: upload-test-results
        name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{matrix.build-os}}
          path: testResults
