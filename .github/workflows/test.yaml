# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test
on:
  workflow_call:
    inputs:
      build-os:
        description: |
          The operating system to test on.
        type: string
        required: true
    secrets:
      github-token:
        description: |
          The token to use when accessing GitHub APIs.
        required: true
      reportgenerator-license:
        description: |
          The license key to use for the code coverage report generator tool.
        required: true
jobs:
  test:
    name: Test
    runs-on: ${{inputs.build-os}}
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - id: checkout-repository
        name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: glektarssza/glekcraft
          token: ${{secrets.github-token}}
          lfs: true
      - id: setup-dotnet
        name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - id: restore-dependencies
        name: Restore dependencies
        run: dotnet restore --locked-mode
      - id: test
        name: Test
        run: dotnet test --no-restore --configuration Debug
      - id: collect-coverage
        name: Collect coverage
        run: dotnet test --no-restore --configuration Debug --collect 'XPlat Code Coverage' --results-directory testResults
      - id: upload-test-results
        name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{inputs.build-os}}
          path: testResults
      - id: install-reportgenerator
        name: Install reportgenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool
      - id: generate-coverage-report
        name: Generate coverage report
        run: |
          reportgenerator '-reporttypes:html' '-title:Glekcraft Code Coverage' \
            '-targetdir:coverage/html' '-reports:**/testResults/**/coverage.cobertura.xml' \
            '-filefilters:-*Interop*' '-license:${{secrets.reportgenerator-license}}'
      - id: generate-dark-coverage-report
        name: Generate dark coverage report
        run: |
          reportgenerator '-reporttypes:html_dark' '-title:Glekcraft Code Coverage' \
            '-targetdir:coverage/html_dark' '-reports:**/testResults/**/coverage.cobertura.xml' \
            '-filefilters:-*Interop*' '-license:${{secrets.reportgenerator-license}}'
      - id: upload-coverage-reports
        name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{inputs.build-os}}
          path: coverage
